<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />

    <title>kolman shop — игровые девайсы и кастомизация</title>
    <meta name="description" content="Игровые мыши, клавиатуры, коврики, наушники и аксессуары. Прямые поставки, моддинг, гарантия, доставка CDEK." />
    <link rel="canonical" href="https://kolmanshop.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="kolman.shop" />
    <meta property="og:title" content="kolman shop — игровые девайсы и кастомизация" />
    <meta property="og:description" content="Игровые мыши, клавиатуры, коврики, наушники и аксессуары. Прямые поставки, моддинг, гарантия, доставка CDEK." />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:url" content="https://kolmanshop.vercel.app/" />
    <meta property="og:locale" content="ru_RU" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="kolman shop" />
    <meta name="twitter:description" content="Игровые мыши, клавиатуры, моддинг и сервис." />
    <meta name="twitter:image" content="/favicon.svg" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!--
      Fonts: discovered at parse time (instead of after App.css fetches and
      blocks on `@import`). Preconnect warms up the TLS+DNS so the actual
      font CSS arrives sooner; `display=swap` is already in the URL so we
      don't FOIT. We also preload the CSS as a stylesheet via `media=print`
      flip so it never blocks the first paint — the fallback `<noscript>`
      keeps things working with JS disabled.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Unbounded:wght@700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Unbounded:wght@700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Unbounded:wght@700;800&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
